syntax = "proto3";

package baccarat.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/card-engine/game_common/api/game_stat/v1;v1";
option java_multiple_files = true;
option java_package = "dev.kratos.api.game_stat.v1";
option java_outer_classname = "HistoryProtoV1";

// 统计
service GameStatApi {
   rpc GetUserStat(GetUserStatRequest) returns (GetUserStatReply);
}

message GetUserStatRequest{
    string appId = 1; //appid
    string playerId = 2; //玩家id
    google.protobuf.Timestamp startTime = 3; // 开始时间
    google.protobuf.Timestamp endTime = 4;   // 结束时间
}

message GetUserStatSnapshot{
    double bet = 1; // 总下注
    double win = 2; // 总赢钱
    int64  roundCount = 3; // 记录数
    float  realtimeRtp = 4; // 实时rtp
}

message GetUserStatReply{
    double totalBet = 1; // 总下注
    double totalWin = 2; // 总赢钱
    int64  roundCount = 3; // 记录数
    float  realtimeRtp = 4; // 实时rtp
    GetUserStatSnapshot recentSnapshot = 5; // 最近快照
    GetUserStatSnapshot todaySnapshot = 6; // 今日快照
}
